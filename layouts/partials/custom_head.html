<script>
  (function () {
    function formatStars(count) {
      if (!Number.isFinite(count)) return "";
      if (count >= 1000) {
        var value = count / 1000;
        var digits = value < 10 ? 1 : 0;
        return value.toFixed(digits).replace(/\.0$/, "") + "k";
      }
      return String(count);
    }

    function validCountText(value) {
      if (Number.isFinite(value)) return formatStars(value);
      if (typeof value !== "string") return "";
      var text = value.trim();
      return /^\d+(?:\.\d+)?[km]?$/i.test(text.replace(/,/g, "")) ? text : "";
    }

    function loadFallbackCounts() {
      if (typeof window.fetch !== "function") return;
      var cache = {};
      document.querySelectorAll("[data-github-star-fallback]").forEach(function (button) {
        var user = button.getAttribute("data-github-user");
        var repo = button.getAttribute("data-github-repo");
        var counter = button.querySelector("[data-github-star-count]");
        if (!user || !repo || !counter) return;
        var key = user + "/" + repo;
        cache[key] = cache[key] || fetch("https://img.shields.io/github/stars/" + encodeURIComponent(user) + "/" + encodeURIComponent(repo) + ".json")
          .then(function (response) { return response.ok ? response.json() : null; })
          .then(function (data) { return validCountText(data && (data.value || data.message)); })
          .then(function (count) {
            if (count) return count;
            return fetch("https://api.github.com/repos/" + encodeURIComponent(user) + "/" + encodeURIComponent(repo))
              .then(function (response) { return response.ok ? response.json() : null; })
              .then(function (data) { return validCountText(data && data.stargazers_count); });
          })
          .catch(function () { return null; });
        cache[key].then(function (countText) {
          if (countText) {
            counter.textContent = countText;
          }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      loadFallbackCounts();
    });
  })();
</script>
